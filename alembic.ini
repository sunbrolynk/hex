# Alembic config for CLI/dev/CI use. The app's startup path (hex.database.migrate)
# builds its Config programmatically and does NOT read this file, so the DSN lives in
# the environment (HEX_DB_*), never here. See docs/BOOTSTRAP.md.
[alembic]
script_location = src/hex/migrations
prepend_sys_path = src
# DSN is supplied by migrations/env.py from HEx settings (HEX_DB_*); keep it out of the file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
