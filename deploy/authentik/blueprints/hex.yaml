# HEx web-BFF OIDC registration + scoped provisioning service account.
#
# Authentik's worker auto-applies this on start (mounted read-only at
# /blueprints/custom). It creates what HEx's bootstrap wiring (Slice 3a-2) then
# CONFIRMS and reads back over the API — HEx never hand-wires OIDC (ADR 0001/0010,
# docs/BOOTSTRAP.md). The verified field recipe lives in session memory
# (authentik-oidc-integration-learnings).
#
# Secrets are deliberately NOT in this file: Authentik generates the confidential
# client_id/client_secret; HEx reads them back via the bootstrap-token API and
# stores them envelope-encrypted (non-negotiable #4). The Android public/PKCE
# provider is omitted until the Android client repo exists — registered together
# with that client, not speculatively (see ADR/session decision).

version: 1
metadata:
  name: HEx - web BFF OIDC + provisioning service account

entries:
  # ── Least-privilege provisioning role (NEVER superuser; non-negotiable #3) ──
  # Curated from the spike's verified permission set; HEx's wiring re-asserts the
  # bound service account is non-superuser before trusting it.
  - model: authentik_rbac.role
    id: hex-provisioner-role
    identifiers:
      name: HEx Provisioner
    attrs:
      name: HEx Provisioner
      permissions:
        - authentik_core.add_user
        - authentik_core.view_user
        - authentik_core.change_user
        - authentik_core.reset_user_password
        - authentik_core.add_user_to_group
        - authentik_core.remove_user_from_group
        - authentik_core.view_group
        # Mint invitations for the HEx enrollment flow (Slice 6-2; hex-enrollment.yaml).
        # view_flow is required to resolve the enrollment flow's pk to bind the invitation to it —
        # without it the runtime flow lookup 403s and acceptance fails (caught in the live demo).
        - authentik_stages_invitation.add_invitation
        - authentik_stages_invitation.view_invitation
        - authentik_flows.view_flow

  # ── Group carrying the role; the SA is a member. is_superuser explicitly false ──
  - model: authentik_core.group
    id: hex-provisioner-group
    identifiers:
      name: HEx Provisioners
    attrs:
      name: HEx Provisioners
      is_superuser: false
      roles:
        - !KeyOf hex-provisioner-role

  # ── Scoped service account HEx rotates its bootstrap token onto (Slice 3a-2) ──
  - model: authentik_core.user
    id: hex-provisioner-sa
    identifiers:
      username: hex-provisioner
    attrs:
      username: hex-provisioner
      name: HEx Provisioner Service Account
      type: service_account
      path: goauthentik.io/users/service-accounts
      groups:
        - !KeyOf hex-provisioner-group

  # ── Custom claim: the HEx acceptance nonce stamped onto the user at enrollment ─
  # user-write persists the invitation's fixed_data.attributes.hex_invite_nonce (Slice 6-2d). This
  # mapping surfaces that high-entropy nonce as an ID-token claim so HEx binds the invite at the
  # OIDC callback from a SIGNED token (tamper-proof) instead of the fragile browser cookie. Rides
  # the already-requested `profile` scope (HEx is the sole client) — absent for non-invite users.
  - model: authentik_providers_oauth2.scopemapping
    id: hex-invite-claim
    identifiers:
      name: HEx invite nonce claim
    attrs:
      name: HEx invite nonce claim
      scope_name: profile
      description: HEx invite acceptance nonce (enrollment binding)
      expression: |
        nonce = request.user.attributes.get("hex_invite_nonce")
        return {"hex_invite_nonce": nonce} if nonce else {}

  # ── Confidential OAuth2 provider for HEx's web BFF login ─────────────────────
  - model: authentik_providers_oauth2.oauth2provider
    id: hex-web-provider
    identifiers:
      name: HEx web BFF
    attrs:
      name: HEx web BFF
      client_type: confidential
      # authorization_code + refresh_token only; the field defaults to [] which
      # breaks authorize with "Invalid grant_type for provider" (spike gotcha #2).
      grant_types:
        - authorization_code
        - refresh_token
      # Default flows Authentik ships. invalidation_flow is REQUIRED in 2026
      # (provider create 400s without it).
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Emit scope-mapping claims in the ID token (not just userinfo) — HEx reads + validates the
      # ID token at the callback, so the invite-id claim must ride there.
      include_claims_in_id_token: true
      # Default OpenID scope mappings, matched by scope_name (fresh instance has
      # only the shipped defaults), plus the HEx invite-id claim above.
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf hex-invite-claim
      # Strict-match BOTH browser hostnames — HEx builds the redirect from the host
      # the browser used and 127.0.0.1 != localhost under strict (spike gotcha #1).
      # 3a-2/owner-setup reconciles these to the owner's real public URL via API.
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:52000/auth/callback
        - matching_mode: strict
          url: http://127.0.0.1:52000/auth/callback

  # ── Application binding the provider; slug must match HEX_AUTHENTIK_OIDC_APP_SLUG ──
  - model: authentik_core.application
    id: hex-web-app
    identifiers:
      slug: hex
    attrs:
      name: HEx
      slug: hex
      provider: !KeyOf hex-web-provider
      meta_launch_url: http://localhost:52000/
      meta_description: The Homelab Experience — access orchestration & dashboard.
