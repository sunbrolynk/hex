# PR/push checks: backend + frontend lint/type/test/coverage/build, dep + secret scans.
# Actions are pinned to full commit SHAs (supply-chain non-negotiable #10); the trailing
# comment is the human-readable version. Bump via Renovate/Dependabot, reviewed manually.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      # Real Postgres for the Alembic migration round-trip (the sqlite suite can't catch
      # PG-specific drift). Image digest matches deploy/docker-compose.yml (supply-chain #10).
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: hex
          POSTGRES_DB: hex
          POSTGRES_PASSWORD: postgres   # ephemeral CI-only DB password; never a real secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hex -d hex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.11.23"   # match the Dockerfile uv pin
      - name: Install (frozen, hash-locked)
        run: uv sync --frozen
      - name: Lint (zero warnings)
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy
      - name: Type check (pyright / Pylance engine)
        run: uv run pyright
      - name: Tests + coverage gate
        run: uv run pytest --cov-report=xml   # --cov/--cov-fail-under come from pyproject addopts
      - name: Security-critical coverage gate (secrets + setup-state + setup token + audit >= 95%)
        # grep guards against a silent no-op if the include glob ever matches zero files.
        run: |
          set -o pipefail
          uv run coverage report \
            --include='*/hex/secrets/*,*/hex/setup/*,*/hex/audit/*,*/hex/database/setup_manager.py,*/hex/database/audit_manager.py' \
            --fail-under=95 | grep -E 'hex/secrets|hex/setup|hex/audit|setup_manager|audit_manager'
      - name: Migration round-trip (Postgres)
        # Scoped env (not job-level) so the weak DB password never reaches the rest of the
        # suite's secret validation. --no-cov keeps the coverage report above intact.
        env:
          HEX_RUN_PG_TESTS: "1"
          HEX_DB_HOST: localhost
          HEX_DB_PORT: "5432"
          HEX_DB_NAME: hex
          HEX_DB_USER: hex
          HEX_DB_PASSWORD: postgres
        run: uv run pytest tests/database/test_migrations.py --no-cov

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
      - name: Install (locked)
        run: npm ci
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high
      - name: Lint (zero warnings)
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Unit/component tests + coverage gate
        run: npm run test:unit
      - name: Build
        run: npm run build
    # E2E (Playwright), visual-regression, and mutation jobs are added with the
    # slices that introduce those flows (none exist at Slice 0).

  dependency-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Python dependency audit
        run: |
          # --no-emit-project: omit the editable local package; pip-audit can't hash it.
          uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements.txt
          uvx pip-audit -r requirements.txt

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required by gitleaks-action v2 to scan PRs

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
